spring.application.name=dazyhub-backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://192.168.100.168:5433/dazyhub?sslmode=disable&socketFactory=com.dazyhub.config.NioSocketFactory}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:cym1754544}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

dazyhub.jwt.secret=${JWT_SECRET:change-this-dev-secret-change-this-dev-secret}
dazyhub.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}
dazyhub.upload-dir=${UPLOAD_DIR:uploads/avatars}

dazyhub.mail.from=${MAIL_FROM:noreply@dazyhub.com}

spring.mail.host=${MAIL_HOST:smtp.qq.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
